name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CARGO_TARGET_DIR: target/phase14-ci/cargo
      RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C link-arg=/Brepro' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux subprocess sandbox
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap && sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Verify Linux subprocess sandbox
        if: runner.os == 'Linux'
        run: bwrap --unshare-user --unshare-ipc --unshare-pid --unshare-net --unshare-uts --unshare-cgroup-try --die-with-parent --new-session --cap-drop ALL --clearenv --ro-bind / / /bin/true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt --component clippy
      - name: Run Linux adversarial sandbox canary
        if: runner.os == 'Linux'
        run: bash scripts/ci-linux-sandbox-canary.sh
      - run: npm ci
      - run: npm run check:rust
      - name: Run native PTY Shell integration
        run: cargo test -p minimax-tools --test shell_pty --locked -- --nocapture
      - name: Run strict-precondition Rust tests
        if: github.event_name != 'workflow_dispatch'
        run: npm run test:rust:strict-precondition
      - name: Run hosted evidence candidate Rust tests
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:rust:candidate
      - name: Run Rust Provider evaluation
        run: npm run eval:provider
      - name: Run Rust retrieval evaluation
        run: npm run eval:retrieval
      - name: Verify strict-precondition Rust source authority and contracts
        if: github.event_name != 'workflow_dispatch'
        run: npm run verify:rust-contracts:strict-precondition
      - name: Verify hosted evidence candidate Rust source authority and contracts
        if: github.event_name == 'workflow_dispatch'
        run: npm run verify:rust-contracts:candidate
      - name: Reject corrupt release package candidates
        run: npm run test:package
      - name: Generate explicit release product fingerprint
        shell: bash
        run: mkdir -p target/phase14-ci && node scripts/release/product-fingerprint.mjs > target/phase14-ci/fingerprint.json
      - run: npm run build:rust:release
      - run: npm run package:rust -- --binary "target/phase14-ci/cargo/release/minimax-cli${{ runner.os == 'Windows' && '.exe' || '' }}" --output target/phase14-ci/artifacts --fingerprint-file target/phase14-ci/fingerprint.json
      - run: npm run verify:rust-release -- --binary "target/phase14-ci/cargo/release/minimax-cli${{ runner.os == 'Windows' && '.exe' || '' }}" --artifacts target/phase14-ci/artifacts --evidence-dir target/phase14-ci/evidence
      - run: npm run verify:milestone-flow -- --artifacts target/phase14-ci/artifacts --evidence-dir target/phase14-ci/evidence --fingerprint-file target/phase14-ci/fingerprint.json
      - name: Upload hosted release evidence
        uses: actions/upload-artifact@v4
        with:
          name: hosted-release-evidence-${{ runner.os }}
          path: target/phase14-ci/evidence/*.json
          if-no-files-found: error
          retention-days: 7
